<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soothsayer AdBlocker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      user-select: none;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 18px 20px 14px;
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      font-size: 26px;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.3px;
    }

    .header-text p {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .toggle-section {
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 14px;
      font-weight: 600;
      color: #f0f0f0;
    }

    .toggle-sub {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .toggle {
      position: relative;
      width: 46px;
      height: 26px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333;
      border-radius: 26px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #7c3aed;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .stats-section {
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e1e;
    }

    .stats-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-number {
      font-size: 22px;
      font-weight: 700;
      color: #a78bfa;
    }

    .stat-label {
      font-size: 10px;
      color: #666;
      margin-top: 3px;
    }

    .options-section {
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e1e;
    }

    .options-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 12px;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .option-row:last-child { margin-bottom: 0; }

    .option-name {
      font-size: 13px;
      color: #ccc;
    }

    .option-name span {
      display: block;
      font-size: 10px;
      color: #555;
      margin-top: 1px;
    }

    .mini-toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .mini-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .mini-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333;
      border-radius: 20px;
      transition: 0.3s;
    }

    .mini-slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .mini-toggle input:checked + .mini-slider {
      background-color: #7c3aed;
    }

    .mini-toggle input:checked + .mini-slider:before {
      transform: translateX(16px);
    }

    .update-section {
      padding: 8px 20px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .filter-version {
      font-size: 10px;
      color: #444;
      flex: 1;
    }

    .footer {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .reset-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    .reset-btn:hover {
      border-color: #7c3aed;
      color: #a78bfa;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    .status-dot.off {
      background: #ef4444;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 11px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🔮</div>
    <div class="header-text">
      <h1>Soothsayer AdBlocker</h1>
      <p>Blocking ads so you don't have to think about it</p>
    </div>
  </div>

  <div class="toggle-section">
    <div>
      <div class="toggle-label">Ad Blocking</div>
      <div class="toggle-sub">Network + visual blocking</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="mainToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats-section">
    <div class="stats-title">This Session</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-number" id="blockedCount">0</div>
        <div class="stat-label">Ads Blocked</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="rulesCount">40</div>
        <div class="stat-label">Block Rules</div>
      </div>
    </div>
  </div>

  <div class="options-section">
    <div class="options-title">Filters</div>

    <div class="option-row">
      <div class="option-name">
        YouTube Ad Skipper
        <span>Auto-skips & hides YouTube ads</span>
      </div>
      <label class="mini-toggle">
        <input type="checkbox" id="youtubeToggle" checked />
        <span class="mini-slider"></span>
      </label>
    </div>

    <div class="option-row">
      <div class="option-name">
        General Site Ads
        <span>Hides banners & promoted content</span>
      </div>
      <label class="mini-toggle">
        <input type="checkbox" id="generalToggle" checked />
        <span class="mini-slider"></span>
      </label>
    </div>
  </div>

  <div class="update-section">
    <div class="filter-version" id="filterVersion">Bundled filters</div>
    <button class="reset-btn" id="updateBtn">Check Now</button>
  </div>

  <div class="footer">
    <div>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Active &amp; blocking</span>
    </div>
    <button class="reset-btn" id="resetBtn">Reset Count</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
